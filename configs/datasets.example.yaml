# 열린재정 데이터셋별 요청주소와 수집 방식을 기록합니다.
# 실제 요청주소는 열린재정 Open API 상세화면의 명세를 확인해 수정하세요.
# 운영 설정은 configs/datasets.yaml을 사용합니다.

datasets:
  expenditure_budget_init:
    name: "세부사업 예산편성현황(총액)"
    url: "https://openapi.openfiscaldata.go.kr/ExpenditureBudgetInit5"
    source_type: api
    enabled: true

  monthly_expenditure:
    name: "월별 지출운용상황"
    url: "https://openapi.openfiscaldata.go.kr/VWFOEM2"
    source_type: api
    enabled: true

  project_settlement:
    name: "사업별결산세출지출현황"
    source_type: local_csv
    directory_env: "OPEN_FISCAL_SETTLEMENT_DIR"
    file_pattern: "사업별결산세출지출현황_{year}.csv"
    enabled: true
